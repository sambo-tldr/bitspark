[project]
name = "bitspark"
description = "BitSpark - Bitcoin-native crowdfunding powered by sBTC"
authors = ["Sambo Emmanuel"]
telemetry = false
cache_dir = "./.cache"

# SIP-010 Fungible Token trait (testnet)
[[project.requirements]]
contract_id = "ST1NXBK3K5YYMD6FD41MVNP3JS1GABZ8TRVX023PT.sip-010-trait-ft-standard"

# sBTC Token dependency (testnet) - used for testnet deployment
[[project.requirements]]
contract_id = "ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT.sbtc-token"

# sBTC Token (mainnet/simnet) - used for simnet unit tests
[[project.requirements]]
contract_id = "SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4.sbtc-token"

[contracts.bitspark]
path = "contracts/bitspark.clar"
clarity_version = 4
epoch = "latest"

# Mock sBTC for unit testing (SIP-010 compliant)
[contracts.mock-sbtc]
path = "contracts/mock-sbtc.clar"
clarity_version = 4
epoch = "latest"

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }

# Check-checker settings:
# trusted_sender: if true, inputs are trusted after tx_sender has been checked.
# trusted_caller: if true, inputs are trusted after contract-caller has been checked.
# callee_filter: if true, untrusted data may be passed into a private function without a
# warning, if it gets checked inside. This check will also propagate up to the
# caller.
# More informations: https://www.hiro.so/blog/new-safety-checks-in-clarinet
